<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge"
    />
    <title>Moyo header</title>
    <link
      rel="stylesheet"
      href="./style.css"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <a href="#home">
        <img
          class="logo"
          src="./images/logo.png"
          alt="Logo square moyo black and blue"
        />
      </a>

      <nav>
        <ul class="links">
          <li>
            <a
              href="#apple"
              class="header_link"
            >
              apple
            </a>
          </li>
          <li>
            <a
              href="#samsung"
              class="header_link"
            >
              samsung
            </a>
          </li>
          <li>
            <a
              href="#laptops"
              class="header_link is-active"
              data-qa="hover"
            >
              laptops & computers
            </a>
          </li>
          <li>
            <a
              href="#gadgets"
              class="header_link"
            >
              gadgets
            </a>
          </li>
          <li>
            <a
              href="#photo"
              class="header_link"
            >
              photo
            </a>
          </li>
          <li>
            <a
              href="#video"
              class="header_link"
            >
              video
            </a>
          </li>
        </ul>
      </nav>
    </header>
  </body>
</html>
